name: Build plugin-store release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to create or update, for example v0.1.0'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

env:
  PLUGIN_ID: codex-force-websearch

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
            ext: so
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            ext: so

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false

      - name: Resolve release metadata
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${INPUT_VERSION:-v0.1.0}"
          fi
          VERSION="${TAG#v}"
          echo "TAG=${TAG}" >> "${GITHUB_ENV}"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "LIB_NAME=${PLUGIN_ID}.${{ matrix.ext }}" >> "${GITHUB_ENV}"
          echo "ARCHIVE_NAME=${PLUGIN_ID}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip" >> "${GITHUB_ENV}"

      - name: Build shared library
        working-directory: go
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          go env
          go mod download
          mkdir -p ../dist
          go build -trimpath -buildmode=c-shared \
            -ldflags "-s -w" \
            -o "../dist/${LIB_NAME}" .
          rm -f "../dist/${PLUGIN_ID}.h"
          file "../dist/${LIB_NAME}"

      - name: Package plugin-store archive
        run: |
          set -euo pipefail
          # CLIProxyAPI plugin-store archives must contain the dynamic library at zip root.
          (cd dist && zip -9 "../${ARCHIVE_NAME}" "${LIB_NAME}")
          sha256sum "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Resolve release tag
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${INPUT_VERSION:-v0.1.0}"
          fi
          echo "TAG=${TAG}" >> "${GITHUB_ENV}"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build checksums.txt
        run: |
          set -euo pipefail
          sort dist/*.sha256 > dist/checksums.txt
          cat dist/checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/*.zip dist/checksums.txt --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${TAG}" dist/*.zip dist/checksums.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "${TAG}" \
              --notes "Automated CLIProxyAPI plugin-store release for ${TAG}."
          fi
